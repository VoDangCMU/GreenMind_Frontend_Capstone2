name: production-deploy

on:
  push:
    branches:
      - dev
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------
      # Install sshpass
      # -------------------------------
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # -------------------------------
      # Deploy Green MindMap Backend
      # -------------------------------
      - name: Deploy Green MindMap Backend
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -p "$SSHPASS" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            bash -s << 'EOF'

          set -e

          echo "Connected to server"

          cd /home/tnqbao/Green_MindMap_Backend

          docker pull iamqbao/green_mind_backend:latest

          docker rm -f green-mind-backend || true

          docker network create green-mindmap-net 2>/dev/null || true

          docker run -d \
            --name green-mind-backend \
            --restart unless-stopped \
            --env-file .env \
            --network green-mindmap-net \
            -p 3000:3000 \
            iamqbao/green_mind_backend:latest

          docker ps | grep green-mind-backend

          echo "Green MindMap Backend deployed successfully"

          EOF
